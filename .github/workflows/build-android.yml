name: Build Android APK

on:
  push:
    branches: [main, claude/analyze-test-coverage-5Gq5x]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync latest index.html into Android assets
        run: cp index.html android/app/src/main/assets/public/index.html

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL "https://github.com/nicholasbair/gradle-wrapper-jar/raw/main/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -sL "https://raw.githubusercontent.com/nicholasbair/gradle-wrapper-jar/main/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          # Fallback: build wrapper jar manually
          if [ ! -s android/gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version=8.2 --project-dir android
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Copy keystore for build
        run: cp android/keystore/rayhanacafe.keystore android/app/rayhanacafe.keystore

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: rayhanacafe.keystore
          KEYSTORE_PASS: rayhanacafe123
          KEY_ALIAS: rayhanacafe
          KEY_PASS: rayhanacafe123

      - name: Rename APK
        run: |
          VERSION=$(grep versionName android/app/build.gradle | grep -o '"[^"]*"' | tr -d '"')
          cp android/app/build/outputs/apk/release/app-release.apk \
             rayhanacafe-v${VERSION}.apk || \
          cp android/app/build/outputs/apk/release/*.apk rayhanacafe-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhanacafe-apk
          path: rayhanacafe-*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/analyze-test-coverage-5Gq5x'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: ريحانة كافيه — إصدار ${{ github.run_number }}
          files: rayhanacafe-*.apk
          body: |
            ## 📱 تطبيق ريحانة كافيه للأندرويد

            ### ✨ ما الجديد في هذا الإصدار:
            - صور الفواتير: التقاط بالكاميرا أو المعرض
            - كشف الرواتب وفق قانون العمل الأردني (26 يوم، OT 125%/150%)
            - تحليل الموردين المتقدم مع مقارنة الشهر السابق
            - حذف المنيو (إدارة مالية وإدارية فقط)

            ### 📥 التثبيت:
            1. حمّل ملف `rayhanacafe-v*.apk`
            2. على هاتفك: **الإعدادات ← الأمان ← السماح بمصادر غير معروفة**
            3. افتح ملف الـ APK وثبّته

            ### 📋 المتطلبات:
            - Android 8.0 (API 26) أو أحدث
          draft: false
          prerelease: false
