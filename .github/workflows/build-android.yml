name: Build Android APK

on:
  push:
    branches: [main, claude/analyze-test-coverage-5Gq5x]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sync index.html to assets
        run: cp index.html android/app/src/main/assets/public/index.html

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhanacafe-v26
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v26.${{ github.run_number }}
          name: "📱 ريحانة كافيه v26.${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/*.apk
          body: |
            ## 📱 ريحانة كافيه — الإصدار 26

            ### ✨ المميزات:
            - 📸 صور الفواتير (كاميرا + معرض)
            - ⚖️ كشف الرواتب — قانون العمل الأردني
            - 📊 تحليل الموردين مع مقارنة شهرية
            - 🗑️ إدارة مالية وإدارية بدون منيو

            ### 📥 التثبيت:
            1. حمّل `app-release.apk`
            2. الإعدادات ← الأمان ← تثبيت تطبيقات غير معروفة ✓
            3. افتح الملف وثبّته

            > Android 7.0+ مطلوب
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
