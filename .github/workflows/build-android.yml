name: Build Android APK

on:
  push:
    branches: [main, claude/implement-todo-item-q6IWC]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses and install packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Sync latest index.html into Android assets
        run: cp index.html android/app/src/main/assets/public/index.html

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.2
          chmod +x gradlew
          ls -lh gradle/wrapper/

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_build.log
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle_build.log

      - name: Commit build log to branch
        if: always()
        run: |
          cp /tmp/gradle_build.log BUILD_LOG.txt 2>/dev/null || echo "no log" > BUILD_LOG.txt
          git config --local user.email "ci@github.com"
          git config --local user.name "CI"
          git add BUILD_LOG.txt
          git diff --cached --quiet || git commit -m "[debug] build log run #${{ github.run_number }}"
          git push origin HEAD:claude/implement-todo-item-q6IWC || true

      - name: Fail if build failed
        working-directory: android
        run: test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Show APK info
        run: find android/app/build/outputs -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhana-cafe-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          name: ريحانة كافيه ${{ github.ref_name }}
          body: |
            ## تطبيق ريحانة كافيه للأندرويد

            ### التثبيت:
            1. حمّل ملف `app-debug.apk`
            2. افتح الملف على جهازك
            3. اسمح بتثبيت التطبيقات من مصادر غير معروفة إذا طُلب منك

            ### المتطلبات:
            - Android 7.0 (API 24) أو أحدث
