name: Build Android APK

on:
  push:
    branches: [main, claude/analyze-test-coverage-5Gq5x]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sync index.html to Android assets
        run: cp index.html android/app/src/main/assets/public/index.html

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required SDK components
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools" || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Copy keystore
        run: cp android/keystore/rayhanacafe.keystore android/app/rayhanacafe.keystore

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: rayhanacafe.keystore
          KEYSTORE_PASS: rayhanacafe123
          KEY_ALIAS: rayhanacafe
          KEY_PASS: rayhanacafe123

      - name: Rename and prepare APK
        run: |
          VERSION=$(grep versionName android/app/build.gradle | grep -o '"[^"]*"' | tr -d '"')
          cp android/app/build/outputs/apk/release/app-release.apk rayhanacafe-v${VERSION}.apk
          echo "APK_FILE=rayhanacafe-v${VERSION}.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhanacafe-apk-v${{ env.VERSION }}
          path: rayhanacafe-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-${{ github.run_number }}
          name: "📱 ريحانة كافيه v${{ env.VERSION }}"
          files: ${{ env.APK_FILE }}
          body: |
            ## 📱 تطبيق ريحانة كافيه للأندرويد

            ### ✨ المميزات:
            - 📸 صور الفواتير (كاميرا + معرض)
            - ⚖️ الرواتب وفق قانون العمل الأردني
            - 📊 تحليل الموردين مع مقارنة الشهر السابق
            - 🗑️ إدارة مالية وإدارية فقط (بدون منيو)

            ### 📥 التثبيت:
            1. حمّل ملف `${{ env.APK_FILE }}`
            2. الإعدادات ← الأمان ← السماح بمصادر غير معروفة
            3. افتح الملف وثبّته

            > Android 8.0+ مطلوب
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
