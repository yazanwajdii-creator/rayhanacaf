name: Build Android APK

on:
  push:
    branches: [main, claude/analyze-test-coverage-5Gq5x]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Sync index.html to assets
        run: cp index.html android/app/src/main/assets/public/index.html

      - name: Build APK manually (no Gradle)
        run: |
          set -e
          BT=$ANDROID_HOME/build-tools/34.0.0
          PLAT=$ANDROID_HOME/platforms/android-34/android.jar
          PROJ=android/app
          BUILD=/tmp/apk-build
          mkdir -p $BUILD/gen $BUILD/obj

          echo "=== 1. Compile resources ==="
          $BT/aapt2 compile --dir $PROJ/src/main/res -o $BUILD/res.zip

          echo "=== 2. Link resources ==="
          $BT/aapt2 link \
            -o $BUILD/resources.apk \
            -I $PLAT \
            --manifest $PROJ/src/main/AndroidManifest.xml \
            --java $BUILD/gen \
            -R $BUILD/res.zip \
            --min-sdk-version 26 \
            --target-sdk-version 34 \
            --version-code 26 \
            --version-name "26.0" \
            --auto-add-overlay

          echo "=== 3. Compile Java ==="
          javac -source 8 -target 8 \
            -cp $PLAT \
            -d $BUILD/obj \
            $PROJ/src/main/java/com/rayhanacafe/app/MainActivity.java \
            $BUILD/gen/com/rayhanacafe/app/R.java

          echo "=== 4. DEX ==="
          $BT/d8 \
            --output $BUILD \
            $(find $BUILD/obj -name "*.class")

          echo "=== 5. Package ==="
          cp $BUILD/resources.apk $BUILD/unaligned.apk
          zip -j $BUILD/unaligned.apk $BUILD/classes.dex
          # assets must be UNCOMPRESSED (-0) so WebView's openFd() can read them
          cd $PROJ/src/main && zip -0 -r $BUILD/unaligned.apk assets/ && cd -

          echo "=== 6. Zipalign ==="
          $BT/zipalign -f 4 $BUILD/unaligned.apk $BUILD/aligned.apk

          echo "=== 7. Sign ==="
          $BT/apksigner sign \
            --ks android/keystore/rayhanacafe.keystore \
            --ks-pass pass:rayhanacafe123 \
            --key-pass pass:rayhanacafe123 \
            --ks-key-alias rayhanacafe \
            --out rayhanacafe-v26.apk \
            $BUILD/aligned.apk

          echo "=== Done ==="
          ls -lh rayhanacafe-v26.apk
          $BT/apksigner verify --verbose rayhanacafe-v26.apk | head -5

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhanacafe-v26
          path: rayhanacafe-v26.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v26.${{ github.run_number }}
          name: "📱 ريحانة كافيه v26.${{ github.run_number }}"
          files: rayhanacafe-v26.apk
          body: |
            ## 📱 ريحانة كافيه — الإصدار 26

            ### ✨ المميزات:
            - 📸 صور الفواتير (كاميرا + معرض)
            - ⚖️ كشف الرواتب — قانون العمل الأردني
            - 📊 تحليل الموردين مع مقارنة شهرية
            - 🗑️ إدارة مالية وإدارية بدون منيو

            ### 📥 التثبيت:
            1. حمّل `rayhanacafe-v26.apk`
            2. الإعدادات ← الأمان ← تثبيت تطبيقات غير معروفة ✓
            3. افتح الملف وثبّته

            > Android 8.0 (API 26) أو أحدث
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
