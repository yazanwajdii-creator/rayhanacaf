name: Build Android APK

on:
  push:
    branches: [main, claude/fix-apk-build-github-Q1Fy1, claude/fix-login-salary-advance-BjQqS]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Check connectivity and environment
        run: |
          echo "## Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_STEP_SUMMARY
          echo "Java: $(java -version 2>&1 | head -1)" >> $GITHUB_STEP_SUMMARY
          GM=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://dl.google.com/dl/android/maven2/com/android/tools/build/gradle/8.5.2/gradle-8.5.2.pom")
          echo "Google Maven (dl.google.com): $GM" >> $GITHUB_STEP_SUMMARY
          GM2=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://maven.google.com/com/android/tools/build/gradle/8.5.2/gradle-8.5.2.pom")
          echo "Google Maven (maven.google.com): $GM2" >> $GITHUB_STEP_SUMMARY
          GR=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://services.gradle.org/distributions/gradle-8.7-bin.zip")
          echo "Gradle distribution: $GR" >> $GITHUB_STEP_SUMMARY
          ls ${ANDROID_SDK_ROOT}/platforms/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "no platforms" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          SDKMANAGER=$(find "${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}" -name "sdkmanager" -type f 2>/dev/null | head -1)
          [ -n "$SDKMANAGER" ] && yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true

      - name: Create local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}" > android/local.properties

      - name: Sync latest index.html into Android assets
        run: cp index.html android/app/src/main/assets/public/index.html

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: v2-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: v2-gradle-

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log
          exit ${PIPESTATUS[0]}

      - name: Show build error in summary
        if: failure()
        run: |
          echo "## Build Error" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -A 20 "FAILURE\|What went wrong\|Could not\|error:" /tmp/build.log | head -60 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhana-cafe-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Publish APK to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ريحانة كافيه — آخر إصدار
          prerelease: true
          files: android/app/build/outputs/apk/debug/*.apk
          body: |
            ## تطبيق ريحانة كافيه للأندرويد

            ### التثبيت:
            1. حمّل ملف `app-debug.apk` مباشرة
            2. افتح الملف على جهازك
            3. اسمح بتثبيت التطبيقات من مصادر غير معروفة إذا طُلب منك

            ### المتطلبات:
            - Android 7.0 (API 24) أو أحدث
