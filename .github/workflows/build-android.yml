name: Build Android APK

on:
  push:
    branches: [main, claude/analyze-test-coverage-5Gq5x]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync latest index.html into Android assets
        run: cp index.html android/app/src/main/assets/public/index.html

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Copy keystore
        run: cp android/keystore/rayhanacafe.keystore android/app/rayhanacafe.keystore

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: rayhanacafe.keystore
          KEYSTORE_PASS: rayhanacafe123
          KEY_ALIAS: rayhanacafe
          KEY_PASS: rayhanacafe123

      - name: Rename APK
        run: |
          VERSION=$(grep versionName android/app/build.gradle | grep -o '"[^"]*"' | tr -d '"')
          cp android/app/build/outputs/apk/release/app-release.apk \
             rayhanacafe-v${VERSION}.apk
          echo "APK_NAME=rayhanacafe-v${VERSION}.apk" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhanacafe-apk
          path: rayhanacafe-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v26-build-${{ github.run_number }}
          name: "ريحانة كافيه v26 — إصدار ${{ github.run_number }}"
          files: rayhanacafe-*.apk
          body: |
            ## 📱 تطبيق ريحانة كافيه للأندرويد — الإصدار 26

            ### ✨ المميزات:
            - 📸 صور الفواتير: التقاط بالكاميرا أو المعرض
            - ⚖️ كشف الرواتب وفق قانون العمل الأردني (26 يوم · OT 125%/150%)
            - 📊 تحليل الموردين المتقدم مع مقارنة الشهر السابق ▲▼
            - 🗑️ حذف المنيو (إدارة مالية وإدارية فقط)

            ### 📥 خطوات التثبيت:
            1. حمّل ملف `${{ env.APK_NAME }}`
            2. **الإعدادات ← الأمان ← السماح بمصادر غير معروفة** ✓
            3. افتح ملف APK وثبّته

            ### 📋 المتطلبات:
            - Android 8.0 (API 26) أو أحدث
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
