name: Build Android APK

on:
  push:
    branches: [main, claude/fix-apk-build-github-Q1Fy1]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK platform 34
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Sync latest index.html into Android assets
        run: cp index.html android/app/src/main/assets/public/index.html

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhana-cafe-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Publish APK to latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ريحانة كافيه — آخر إصدار
          prerelease: true
          files: android/app/build/outputs/apk/debug/*.apk
          body: |
            ## تطبيق ريحانة كافيه للأندرويد

            ### التثبيت:
            1. حمّل ملف `app-debug.apk` مباشرة
            2. افتح الملف على جهازك
            3. اسمح بتثبيت التطبيقات من مصادر غير معروفة إذا طُلب منك

            ### المتطلبات:
            - Android 7.0 (API 24) أو أحدث
