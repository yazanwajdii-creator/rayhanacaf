name: Build Android APK

on:
  push:
    branches: [main, claude/implement-todo-item-q6IWC]
    paths:
      - 'index.html'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Sync latest index.html into Android assets
        run: |
          cp index.html android/app/src/main/assets/public/index.html
          diff index.html android/app/src/main/assets/public/index.html && echo "✅ Files are identical"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms/" || true
          ls "$ANDROID_HOME/build-tools/" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../BUILD_LOG.txt
        continue-on-error: true

      - name: Push build log to branch
        if: always()
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI"
          git add BUILD_LOG.txt
          git diff --cached --quiet || git commit -m "[ci] build log run #${{ github.run_number }}"
          git push origin HEAD:claude/implement-todo-item-q6IWC || true

      - name: Fail if no APK
        run: test -f android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rayhana-cafe-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          name: ريحانة كافيه ${{ github.ref_name }}
          body: |
            ## تطبيق ريحانة كافيه للأندرويد

            ### التثبيت:
            1. حمّل ملف `app-debug.apk`
            2. افتح الملف على جهازك
            3. اسمح بتثبيت التطبيقات من مصادر غير معروفة إذا طُلب منك

            ### المتطلبات:
            - Android 7.0 (API 24) أو أحدث
